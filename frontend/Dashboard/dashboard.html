<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coach Dashboard</title>
    <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">

        <!-- Ist die Einbindung der ICONS per svg in ordnung oder gibt es bessere Lösungen? -->
        <button class="nav-btn" aria-label="Profil">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.76 0 5-2.24 5-5S14.76 2 12 2 7 4.24 7 7s2.24 5 5 5Zm0 2c-3.33 0-10 1.67-10 5v3h20v-3c0-3.33-6.67-5-10-5Z"/></svg>
        </button>
        <button class="nav-btn active" aria-label="Home">
            <svg viewBox="0 0 24 24"><path d="M12 3 3 10v11h6v-7h6v7h6V10l-9-7Z"/></svg>
        </button>
        <button class="nav-btn" aria-label="Nachrichten">
            <svg viewBox="0 0 24 24"><path d="M4 4h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H8l-4 4V6a2 2 0 0 1 2-2Z"/></svg>
        </button>
        <button class="nav-btn" aria-label="Einstellungen">
            <svg viewBox="0 0 24 24"><path d="M19.14,12.94a7.49,7.49,0,0,0,.05-.94,7.49,7.49,0,0,0-.05-.94l2.11-1.65a.5.5,0,0,0,.12-.64l-2-3.46a.5.5,0,0,0-.6-.22l-2.49,1a7.28,7.28,0,0,0-1.63-.94l-.38-2.65A.5.5,0,0,0,13.78,2H10.22a.5.5,0,0,0-.49.42L9.35,5.07a7.28,7.28,0,0,0-1.63.94l-2.49-1a.5.5,0,0,0-.6.22l-2,3.46a.5.5,0,0,0,.12.64L4.86,11.06a7.49,7.49,0,0,0-.05.94,7.49,7.49,0,0,0,.05.94L2.75,14.59a.5.5,0,0,0-.12.64l2,3.46a.5.5,0,0,0,.6.22l2.49-1a7.28,7.28,0,0,0,1.63.94l.38,2.65a.5.5,0,0,0,.49.42h3.56a.5.5,0,0,0,.49-.42l.38-2.65a7.28,7.28,0,0,0,1.63-.94l2.49,1a.5.5,0,0,0,.6-.22l2-3.46a.5.5,0,0,0-.12-.64ZM12,15.5A3.5,3.5,0,1,1,15.5,12,3.5,3.5,0,0,1,12,15.5Z"/></svg>
        </button>
    </aside>

    <main class="content">
        <section class="welcome">
            <h1>Willkommen zurück, DB</h1>
            <p>Behalte deinen Fortschritt im Auge.</p>
        </section>

        <section class="dashboard">
            <article class="card">
                <h2>Gewicht</h2>
                <div class="weight-row">
                    <div class="weight-box">
                        <div class="weight-number" id="weightValue">DB</div>
                    </div>
                    <div class="weight-unit">kg</div>
                </div>
                <div class="meta">Letzte Messung: <span id="lastMeasurement">-DB-</span></div>

                <div class="input-section">
                    <label for="weightInput">Neues Gewicht eingeben:</label><br>
                    <input type="text" id="weightInput" placeholder="Gewicht eingeben">
                    <button id="saveBtn">Speichern</button>
                </div>
            </article>

            <article class="card">
                <div class="chart-top">
                    <h2>Fortschritt Gewichtsverlauf</h2>
                    <span class="badge">Weekly</span>
                </div>

                <!-- Ist hier die Verwendung von SVG in Ordnung? -->
                <div class="chart-wrap">
                    <svg class="chart-svg" viewBox="0 0 760 270" xmlns="http://www.w3.org/2000/svg" aria-label="Gewichtsverlauf">
                        <defs>
                            <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" class="line-gradient-stop-1" />
                                <stop offset="55%" class="line-gradient-stop-2" />
                                <stop offset="100%" class="line-gradient-stop-3" />
                            </linearGradient>
                        </defs>

                        <!-- Das hier lieber in ein extra html File auslagern? -->
                        <line class="grid-line" x1="90" y1="35" x2="90" y2="180" />
                        <line class="grid-line" x1="170" y1="35" x2="170" y2="180" />
                        <line class="grid-line" x1="250" y1="35" x2="250" y2="180" />
                        <line class="grid-line" x1="330" y1="35" x2="330" y2="180" />
                        <line class="grid-line" x1="410" y1="35" x2="410" y2="180" />
                        <line class="grid-line" x1="490" y1="35" x2="490" y2="180" />
                        <line class="grid-line" x1="570" y1="35" x2="570" y2="180" />
                        <line class="grid-line" x1="650" y1="35" x2="650" y2="180" />

                        <path class="chart-line" d="M90 150 C120 120, 145 90, 170 92 C195 95, 222 130, 250 118 C278 106, 305 72, 330 78 C356 84, 384 145, 410 125 C437 105, 463 65, 490 82 C518 100, 544 146, 570 134 C598 121, 626 82, 650 52" />

                        <circle class="point" cx="90" cy="150" r="10" />
                        <circle class="point" cx="170" cy="92" r="10" />
                        <circle class="point" cx="250" cy="118" r="10" />
                        <circle class="point" cx="330" cy="78" r="10" />
                        <circle class="point" cx="410" cy="125" r="10" />
                        <circle class="point" cx="490" cy="84" r="10" />
                        <circle class="point last" cx="650" cy="52" r="12" />

                        <text class="axis-label" x="90" y="242">DB</text>
                        <text class="axis-label" x="170" y="242">DB</text>
                        <text class="axis-label" x="250" y="242">DB</text>
                        <text class="axis-label" x="330" y="242">DB</text>
                        <text class="axis-label" x="410" y="242">DB</text>
                        <text class="axis-label" x="490" y="242">DB</text>
                        <text class="axis-label" x="570" y="242">DB</text>
                        <text class="axis-label" x="650" y="242">DB</text>
                    </svg>
                </div>
            </article>
        </section>
    </main>
</div>
<script src="dashboard.js"></script>
</body>
</html>
